# ============================================================================
# Nginx SSL Configuration — Lead Analytics CRM
# ============================================================================
# INSTRUÇÕES:
#
# 1. SEM DOMÍNIO (só IP): use o docker-compose.yml padrão (porta 3000, sem SSL)
#
# 2. COM DOMÍNIO: siga os passos:
#    a) Substitua SEU_DOMINIO.com pelo seu domínio real (3 ocorrências abaixo)
#    b) Gere os certificados SSL (ex: Certbot / Let's Encrypt):
#       sudo certbot certonly --standalone -d seudominio.com -d www.seudominio.com
#    c) Copie os certificados para ssl/certs/:
#       cp /etc/letsencrypt/live/seudominio.com/fullchain.pem ./ssl/certs/
#       cp /etc/letsencrypt/live/seudominio.com/privkey.pem ./ssl/certs/
#    d) Suba com o compose de produção:
#       docker-compose -f docker-compose.prod.yml up --build -d
# ============================================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # Redireciona todo tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

# Servidor HTTPS principal
server {
    listen 443 ssl;
    server_name SEU_DOMINIO.com www.SEU_DOMINIO.com;

    # Certificados SSL (montados via volume do docker-compose.prod.yml)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Serve arquivos estáticos do frontend (React/Vite build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o backend FastAPI
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts maiores para uploads de CSV
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # Health check endpoint (usado pelo docker healthcheck)
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Páginas de erro
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
